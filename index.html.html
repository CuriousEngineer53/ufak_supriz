<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seni Seviyorum ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #ffe6e6;
        margin: 0;
        font-family: 'Dancing Script', cursive; 
        overflow: hidden;
        position: relative;
        cursor: pointer; 
        user-select: none;
    }

    /* Arka Planda Kayan Kalpler Kapsayıcısı */
    .floating-hearts {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }

    .heart-float {
        position: absolute;
        width: 15px;
        height: 15px;
        background-color: #ffcccc;
        opacity: 0;
        /* Yeni süzülme animasyonu */
        animation: fallingWavy linear infinite;
    }

    .heart-float::before, .heart-float::after {
        content: "";
        position: absolute;
        width: 100%; height: 100%;
        background-color: #ffcccc;
        border-radius: 50%;
    }
    .heart-float::before { top: -50%; left: 0; }
    .heart-float::after { left: 50%; top: 0; }

    /* Sağa sola süzülerek (yaprak gibi) düşme efekti */
    @keyframes fallingWavy {
        0% { opacity: 0; top: -10%; transform: translateX(0) rotate(-45deg) scale(0.8); }
        20% { opacity: 0.8; transform: translateX(-30px) rotate(-45deg) scale(0.9); }
        40% { transform: translateX(30px) rotate(-45deg) scale(1); }
        60% { transform: translateX(-30px) rotate(-45deg) scale(1.1); }
        80% { opacity: 0.8; transform: translateX(30px) rotate(-45deg) scale(1.2); }
        100% { opacity: 0; top: 110%; transform: translateX(-10px) rotate(-45deg) scale(1.3); }
    }

    /* Ana Kalp Kapsayıcısı */
    .main-heart-container {
        position: relative;
        width: 200px;
        height: 200px;
        animation: heartbeat 1.2s infinite ease-in-out;
        z-index: 10;
        transition: transform 0.1s;
    }

    .main-heart-container:active {
        transform: scale(0.9);
    }

    .heart {
        position: absolute;
        width: 200px;
        height: 200px;
        background: #ff0d0d;
        transform: rotate(-45deg);
        box-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
    }

    .heart::before, .heart::after {
        content: "";
        position: absolute;
        width: 200px; height: 200px;
        background: #ff0d0d;
        border-radius: 50%;
    }
    .heart::before { top: -100px; left: 0; }
    .heart::after { left: 100px; top: 0; }

    /* Metin */
    .text {
        position: absolute;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 38px;
        font-weight: bold;
        text-align: center;
        z-index: 10;
        white-space: nowrap;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        transition: opacity 0.3s;
    }

    /* Konfeti Parçacıkları */
    .confetti {
        position: absolute;
        width: 8px;
        height: 8px;
        pointer-events: none;
        z-index: 100;
        border-radius: 2px;
    }

    /* Alt Kısımdaki Yönlendirme Yazısı */
    .instruction-text {
        position: absolute;
        bottom: 30px;
        font-size: 32px;
        color: #d10000;
        font-weight: bold;
        text-align: center;
        width: 100%;
        pointer-events: none;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        animation: pulseText 2s infinite ease-in-out; /* Yazıya da hafif bir nefes alma efekti */
    }

    @keyframes heartbeat {
        0% { transform: scale(1); }
        15% { transform: scale(1.15); }
        30% { transform: scale(1); }
        45% { transform: scale(1.15); }
        100% { transform: scale(1); }
    }

    @keyframes pulseText {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
    }
</style>
</head>
<body onclick="surprizYap(event)">

    <!-- Arka plan kalpleri için boş kapsayıcı, JavaScript ile dolduracağız -->
    <div class="floating-hearts" id="bg-hearts"></div>

    <!-- Ana Kalp -->
    <div class="main-heart-container">
        <div class="heart"></div>
        <div class="text" id="mainText"></div>
    </div>

    <!-- Alt Yazı -->
    <div class="instruction-text">Kalbimize Tıkla Sevgilimm ❤️</div>

    <script>
        // Arka plandaki süzülen kalpleri rastgele oluşturma fonksiyonu
        function arkaPlanKalpleriniOlustur() {
            const container = document.getElementById('bg-hearts');
            const kalpSayisi = 35; // Kalp sayısını artırdık

            for (let i = 0; i < kalpSayisi; i++) {
                let kalp = document.createElement('div');
                kalp.classList.add('heart-float');
                
                // Ekranın rastgele bir yerinden başlasın (%0 ile %100 arası)
                kalp.style.left = Math.random() * 100 + 'vw';
                
                // Düşme süresi rastgele olsun (4 ile 9 saniye arası)
                kalp.style.animationDuration = (Math.random() * 5 + 4) + 's';
                
                // Başlama gecikmesi rastgele olsun ki hepsi aynı anda düşmesin
                kalp.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(kalp);
            }
        }

        // Sayfa yüklendiğinde kalpleri oluştur
        arkaPlanKalpleriniOlustur();

        // Tıklama ile çalışan sürpriz fonksiyonu
        function surprizYap(e) {
            // 1. Yazıyı değiştir
            const textElement = document.getElementById('mainText');
            textElement.innerText = "İyi ki hayatımdasın ❤️";
            textElement.style.fontSize = "30px";
            
            // 3 saniye sonra yazıyı eski haline döndür
            setTimeout(() => {
                textElement.innerText = "Seni Çok Seviyorum";
                textElement.style.fontSize = "38px";
            }, 3000);

            // 2. Konfetileri Patlat
            for (let i = 0; i < 50; i++) { // Konfeti sayısını da biraz artırdım
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                const renkler = ['#ff0d0d', '#ffffff', '#ffd700', '#ff6666', '#ff9999'];
                confetti.style.backgroundColor = renkler[Math.floor(Math.random() * renkler.length)];
                
                confetti.style.left = e.clientX + 'px';
                confetti.style.top = e.clientY + 'px';
                
                const aci = Math.random() * Math.PI * 2;
                const hiz = Math.random() * 15 + 5;
                const velocityX = Math.cos(aci) * hiz;
                const velocityY = Math.sin(aci) * hiz;
                
                let posX = e.clientX;
                let posY = e.clientY;
                let opacity = 1;

                document.body.appendChild(confetti);

                const moveConfetti = setInterval(() => {
                    posX += velocityX;
                    posY += velocityY + 2; 
                    opacity -= 0.02;
                    
                    confetti.style.left = posX + 'px';
                    confetti.style.top = posY + 'px';
                    confetti.style.opacity = opacity;

                    if (opacity <= 0) {
                        clearInterval(moveConfetti);
                        confetti.remove();
                    }
                }, 30);
            }
        }
    </script>
</body>
</html>
